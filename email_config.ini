; SMTP settings for payment SLA notification emails (notifier.py).
; Sends alerts to salesops@bayut.sa (recipient set in notifier.py NOTIFY_TO).
;
; ---- GMAIL SETUP ----
; 1. Use a Gmail / Google Workspace account as the SENDER.
; 2. Enable 2-Step Verification on that account.
; 3. Create an App Password:  Google Account > Security > App passwords
;    (generates a 16-character password like "abcd efgh ijkl mnop").
; 4. Put the sender Gmail address in BOTH username and from_addr below,
;    and paste the 16-char app password (spaces optional) into password.
;
; Example:
;   username  = waheed.rasool@bayut.sa
;   password  = nmvt mlqi qvnm rqri
;   from_addr = salesops@bayut.sa

[smtp]
host = smtp.gmail.com
port = 587
username = waheed.rasool@bayut.sa
password = nmvt mlqi qvnm rqri
from_addr = waheed.rasool@bayut.sa
use_tls = true

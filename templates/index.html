<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in · SalesOps Ticket Portal</title>
<style>
 body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#f4f7f5;color:#132a1f;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:70px 16px}
 .box{width:100%;max-width:420px;background:#fff;border:1px solid #dce6df;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.06)}
 .hd{background:linear-gradient(135deg,#063d24,#0d7a3f);color:#fff;padding:20px 24px}
 .hd h1{margin:0;font-size:1.15rem} .hd .s{font-size:.72rem;opacity:.85;margin-top:3px}
 .bd{padding:22px 24px}
 label{font-size:.7rem;font-weight:700;color:#5d7168;text-transform:uppercase;letter-spacing:.4px}
 input{width:100%;box-sizing:border-box;margin-top:6px;padding:11px 13px;border:1px solid #dce6df;border-radius:9px;font-size:.9rem}
 button{width:100%;margin-top:14px;background:#0d7a3f;color:#fff;border:0;border-radius:9px;padding:12px;font-size:.9rem;font-weight:700;cursor:pointer}
 button:hover{background:#063d24}
 .msg{margin-top:14px;font-size:.82rem;padding:10px 12px;border-radius:8px;background:#ecfdf3;border:1px solid #bbf7d0;color:#0d7a3f}
 .alt{margin-top:18px;font-size:.8rem;text-align:center} a{color:#0d7a3f}
 .note{font-size:.68rem;color:#5d7168;margin-top:10px}
</style></head><body>
<div class="box">
  <div class="hd"><h1>SalesOps Ticket Portal</h1><div class="s">Sign in with your Bayut email</div></div>
  <div class="bd">
    <form method="post">
      <label>Work email</label>
      <input type="email" name="email" placeholder="you@bayut.sa" required autofocus>
      <button type="submit">Email me a sign-in link</button>
    </form>
    {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
    <div class="note">We'll email a one-time link to your @bayut.sa address. No password needed.</div>
    <div class="alt">Don't have access yet? <a href="/request-access">Request access</a></div>
  </div>
</div></body></html>

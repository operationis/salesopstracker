<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Request access · SalesOps Ticket Portal</title>
<style>
 body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#f4f7f5;color:#132a1f;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:70px 16px}
 .box{width:100%;max-width:440px;background:#fff;border:1px solid #dce6df;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.06)}
 .hd{background:linear-gradient(135deg,#063d24,#0d7a3f);color:#fff;padding:20px 24px}
 .hd h1{margin:0;font-size:1.1rem} .hd .s{font-size:.72rem;opacity:.85;margin-top:3px}
 .bd{padding:22px 24px}
 label{font-size:.7rem;font-weight:700;color:#5d7168;text-transform:uppercase;letter-spacing:.4px}
 input,textarea{width:100%;box-sizing:border-box;margin-top:6px;padding:11px 13px;border:1px solid #dce6df;border-radius:9px;font-size:.9rem;font-family:inherit}
 button{width:100%;margin-top:14px;background:#0d7a3f;color:#fff;border:0;border-radius:9px;padding:12px;font-size:.9rem;font-weight:700;cursor:pointer}
 .msg{margin-top:14px;font-size:.82rem;padding:10px 12px;border-radius:8px;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c}
 .ok{background:#ecfdf3;border:1px solid #bbf7d0;color:#0d7a3f}
 .alt{margin-top:18px;font-size:.8rem;text-align:center} a{color:#0d7a3f}
</style></head><body>
<div class="box">
  <div class="hd"><h1>Request access</h1><div class="s">SalesOps Ticket Portal</div></div>
  <div class="bd">
  {% if sent %}
    <div class="msg ok">✓ Your request has been sent to the administrator. You'll receive an email once access is approved (View or Edit).</div>
    <div class="alt"><a href="/login">Back to sign in</a></div>
  {% else %}
    <form method="post">
      <label>Work email</label>
      <input type="email" name="email" value="{{ email }}" placeholder="you@bayut.sa" required autofocus>
      <label style="display:block;margin-top:14px">Why do you need access? (optional)</label>
      <textarea name="note" rows="3" placeholder="e.g. Sales Ops — need to track/tag tickets"></textarea>
      <button type="submit">Request access</button>
    </form>
    {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
    <div class="alt">Already have access? <a href="/login">Sign in</a></div>
  {% endif %}
  </div>
</div></body></html>
